<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Debug Console - WebSocket Test</title>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: #333;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    
    .status {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: bold;
      text-align: center;
    }
    
    .status.disconnected {
      background: #fee;
      color: #c33;
      border: 2px solid #fcc;
    }
    
    .status.connected {
      background: #efe;
      color: #3c3;
      border: 2px solid #cfc;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      transition: all 0.3s ease;
      flex: 1;
      min-width: 150px;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-success {
      background: #48bb78;
      color: white;
    }
    
    .btn-success:hover {
      background: #38a169;
      transform: translateY(-2px);
    }
    
    .btn-danger {
      background: #f56565;
      color: white;
    }
    
    .btn-danger:hover {
      background: #e53e3e;
      transform: translateY(-2px);
    }
    
    .logs-container {
      background: #1a202c;
      border-radius: 10px;
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    
    .log-entry {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border-left: 4px solid;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .log-entry.critical {
      background: #742a2a;
      border-color: #fc8181;
      color: #feb2b2;
    }
    
    .log-entry.error {
      background: #7c2d12;
      border-color: #f97316;
      color: #fdba74;
    }
    
    .log-entry.warning {
      background: #78350f;
      border-color: #fbbf24;
      color: #fde68a;
    }
    
    .log-entry.info {
      background: #1e3a8a;
      border-color: #3b82f6;
      color: #93c5fd;
    }
    
    .log-entry.debug {
      background: #374151;
      border-color: #9ca3af;
      color: #d1d5db;
    }
    
    .log-time {
      color: #9ca3af;
      font-size: 0.85em;
    }
    
    .log-source {
      color: #fbbf24;
      font-weight: bold;
      margin: 0 8px;
    }
    
    .log-severity {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: bold;
      text-transform: uppercase;
      margin-right: 8px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 10px;
      color: white;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2em;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .stat-label {
      font-size: 0.9em;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔌 Smart Debug Console</h1>
    <p class="subtitle">WebSocket Real-Time Test Client</p>
    
    <div id="status" class="status disconnected">
      ❌ Disconnected
    </div>
    
    <div class="controls">
      <button class="btn-primary" onclick="connectSocket()">Connect</button>
      <button class="btn-danger" onclick="disconnectSocket()">Disconnect</button>
      <button class="btn-success" onclick="sendTestLog()">Send Test Log</button>
      <button class="btn-primary" onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">Total Logs</div>
        <div class="stat-value" id="total-logs">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Critical</div>
        <div class="stat-value" id="critical-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="error-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Warnings</div>
        <div class="stat-value" id="warning-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Info</div>
        <div class="stat-value" id="info-count">0</div>
      </div>
    </div>
    
    <h2 style="margin: 20px 0 10px 0;">📊 Live Logs</h2>
    <div class="logs-container" id="logs">
      <p style="color: #9ca3af;">Waiting for logs...</p>
    </div>
  </div>
  
  <script>
    let socket = null;
    let logCount = 0;
    let stats = {
      critical: 0,
      error: 0,
      warning: 0,
      info: 0,
      debug: 0
    };
    
    function connectSocket() {
      if (socket && socket.connected) {
        alert('Already connected!');
        return;
      }
      
      socket = io('http://localhost:5000');
      
      socket.on('connect', () => {
        updateStatus(true);
        addSystemLog('Connected to server', 'info');
      });
      
      socket.on('connection-success', (data) => {
        addSystemLog(`Welcome! Socket ID: ${data.socketId}`, 'info');
      });
      
      socket.on('new-log', (log) => {
        addLog(log);
      });
      
      socket.on('log-stats', (statsData) => {
        updateStats(statsData);
      });
      
      socket.on('disconnect', () => {
        updateStatus(false);
        addSystemLog('Disconnected from server', 'error');
      });
      
      socket.on('error', (error) => {
        addSystemLog(`Error: ${error.message}`, 'error');
      });
    }
    
    function disconnectSocket() {
      if (socket) {
        socket.disconnect();
        socket = null;
        updateStatus(false);
      }
    }
    
    function sendTestLog() {
      if (!socket || !socket.connected) {
        alert('Please connect first!');
        return;
      }
      
      const severities = ['info', 'warning', 'error', 'critical', 'debug'];
      const randomSeverity = severities[Math.floor(Math.random() * severities.length)];
      
      const testLog = {
        message: `Test log message at ${new Date().toLocaleTimeString()}`,
        severity: randomSeverity,
        source: 'test-client',
        metadata: { test: true }
      };
      
      socket.emit('send-log', testLog);
    }
    
    function addLog(log) {
      logCount++;
      stats[log.severity] = (stats[log.severity] || 0) + 1;
      
      const logsContainer = document.getElementById('logs');
      if (logsContainer.children.length === 1 && logsContainer.children[0].textContent === 'Waiting for logs...') {
        logsContainer.innerHTML = '';
      }
      
      const logEntry = document.createElement('div');
      logEntry.className = `log-entry ${log.severity}`;
      
      const time = new Date(log.timestamp).toLocaleTimeString();
      
      logEntry.innerHTML = `
        <span class="log-time">[${time}]</span>
        <span class="log-severity">${log.severity}</span>
        <span class="log-source">${log.source}</span>
        <span>${log.message}</span>
      `;
      
      logsContainer.insertBefore(logEntry, logsContainer.firstChild);
      
      // Keep only last 50 logs
      while (logsContainer.children.length > 50) {
        logsContainer.removeChild(logsContainer.lastChild);
      }
      
      updateLocalStats();
    }
    
    function addSystemLog(message, severity) {
      const log = {
        message,
        severity,
        source: 'system',
        timestamp: new Date().toISOString()
      };
      addLog(log);
    }
    
    function updateStatus(connected) {
      const statusEl = document.getElementById('status');
      if (connected) {
        statusEl.className = 'status connected';
        statusEl.textContent = '✅ Connected to WebSocket';
      } else {
        statusEl.className = 'status disconnected';
        statusEl.textContent = '❌ Disconnected';
      }
    }
    
    function updateLocalStats() {
      document.getElementById('total-logs').textContent = logCount;
      document.getElementById('critical-count').textContent = stats.critical || 0;
      document.getElementById('error-count').textContent = stats.error || 0;
      document.getElementById('warning-count').textContent = stats.warning || 0;
      document.getElementById('info-count').textContent = stats.info || 0;
    }
    
    function updateStats(statsData) {
      if (statsData.bySeverity) {
        stats = statsData.bySeverity;
        logCount = statsData.total;
        updateLocalStats();
      }
    }
    
    function clearLogs() {
      document.getElementById('logs').innerHTML = '<p style="color: #9ca3af;">Logs cleared. Waiting for new logs...</p>';
      logCount = 0;
      stats = { critical: 0, error: 0, warning: 0, info: 0, debug: 0 };
      updateLocalStats();
    }
    
    // Auto-connect on page load
    window.onload = () => {
      connectSocket();
    };
  </script>
</body>
</html>
