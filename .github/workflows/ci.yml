name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_debug
          POSTGRES_USER: debug_user
          POSTGRES_PASSWORD: debug_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://debug_user:debug_secret@localhost:5432/smart_debug
          ML_SERVICE_URL: http://localhost:5001
          NODE_ENV: test

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt
      - name: Install dependencies
        run: cd ml-service && pip install -r requirements.txt
      - name: Train model
        run: cd ml-service && python src/train_model.py
      - name: Run tests
        run: cd ml-service && python -m pytest src/tests/ -v

  build-docker:
    needs: [test-backend, test-ml]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build all images
        run: docker compose build
